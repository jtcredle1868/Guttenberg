version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guttenberg
      POSTGRES_USER: guttenberg
      POSTGRES_PASSWORD: guttenberg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Redis (Celery broker + cache) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Django API Server ────────────────────────────────────────────────
  api:
    build:
      context: ./backend_django
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn guttenberg.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    environment:
      - DJANGO_SETTINGS_MODULE=guttenberg.settings.development
      - DB_HOST=db
      - DB_NAME=guttenberg
      - DB_USER=guttenberg
      - DB_PASSWORD=guttenberg
      - CELERY_BROKER_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  # ── Celery Worker (agentic AI processing) ────────────────────────────
  celery-worker:
    build:
      context: ./backend_django
      dockerfile: Dockerfile
    command: celery -A guttenberg worker -l info -Q default,manuscripts,formatting,distribution,ai,finance,covers
    environment:
      - DJANGO_SETTINGS_MODULE=guttenberg.settings.development
      - DB_HOST=db
      - DB_NAME=guttenberg
      - DB_USER=guttenberg
      - DB_PASSWORD=guttenberg
      - CELERY_BROKER_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - db
      - redis

  # ── Celery Beat (scheduled tasks) ────────────────────────────────────
  celery-beat:
    build:
      context: ./backend_django
      dockerfile: Dockerfile
    command: celery -A guttenberg beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=guttenberg.settings.development
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  # ── React Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api

volumes:
  pgdata:
